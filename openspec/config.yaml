schema: spec-driven

context: |
  Tech stack: Raku, Air framework, Cro HTTP, htmx, picocss (green theme).

  Air elements in use:
  - Air::Functional :BASE — h1, h3, p, div, a, img, span, header, footer, spacer, safe, markdown (HTML DSL)
  - Air::Base — site, page, nav, main, footer, external, Analytics, background, dashboard, panel, grid
  - Air::Form — Form role, %va validators, Member form (name, nick, email)

  Site construction pattern:
    - `page.assuming(...)` partially applies global page parameters (title, favicon, description, footer)
    - `background(...)` creates a Camelia watermark $shadow passed into each page sub
    - `site :@tools :$html404 :theme-color<green> :bold-color<#0000F3> :register[...]` wraps all pages
    - `Analytics.new :provider(Umami) :key<...>` for analytics
    - `nav(logo => ...)` with no nav items — Camelia logo linking back to raku.org
    - `grid :grid-template-columns("1fr 2fr 1fr")` for centred hero layout
    - `dashboard [...]` for flex-wrap panel layout
    - `panel [ header ...; markdown ...; footer [...] ]` for content cards
    - `markdown q:to/END/` for inline Markdown within panels
    - `safe Q|...|` for raw HTML strings embedded in Air output
    - `Member does Form` (Air::Form) for member registration

  Pages:
    - Home (lib/RakuFoundation/Home.rakumod) — hero + member form + dashboard of 10 panels
    - HTML404 (lib/RakuFoundation/HTML404.rakumod) — registered via :$html404 on site

  Modules:
    - RakuFoundation (lib/RakuFoundation.rakumod) — site assembly
    - RakuFoundation::Home — home page
    - RakuFoundation::HTML404 — 404 page
    - RakuFoundation::MemberForm — Member form (Air::Form)

  Styling: picocss green theme. Bold colour override: #0000F3.
  Panel footer aligned to bottom via margin-top: auto (in panel STYLE).
  Never edit static/css/styles.scss — it is autogenerated by Air.

  Deployment:
  - Docker image: quay.io/librasteve/raku-foundation:latest
  - CI/CD: GitHub Actions → scripts/cibuild.sh on push to main
  - Server: docker-compose + Caddy reverse proxy (multi-site setup)
  - Port: 3000 (CRO_WEBSITE_HOST/PORT env vars)
