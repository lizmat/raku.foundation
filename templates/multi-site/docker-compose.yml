services:
  harcstack-org:
    image: quay.io/librasteve/harcstack-org:latest
    container_name: harcstack-org
    expose:
      - "3000"
    networks:
      - webnet
    restart: unless-stopped

  cragcli-info:
    image: quay.io/librasteve/cragcli-info:latest
    container_name: cragcli-info
    expose:
      - "3000"
    networks:
      - webnet
    restart: unless-stopped

  slangify-org:
    image: quay.io/librasteve/slangify-org:latest
    container_name: slangify-org
    expose:
      - "3000"
    networks:
      - webnet
    restart: unless-stopped

  grammar-editor:
    image: quay.io/librasteve/grammar-editor:latest
    container_name: grammar-editor
    expose:
      - "3001"
    environment:
      GRAMMAR_WORKER_URL: "http://grammar-worker:9000"
      GRAMMAR_SNAPSHOTS_DB: "/data/grammar-snapshots.sqlite3"
    volumes:
      - grammar-snapshots:/data
    depends_on:
      - grammar-worker
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - webnet
      - grammar-net
    restart: unless-stopped

  grammar-worker:
    image: quay.io/librasteve/grammar-worker:latest
    container_name: grammar-worker
    expose:
      - "9000"
    mem_limit: 1g
    memswap_limit: 1g
    cpus: "1.0"
    pids_limit: 50
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    environment:
      GRAMMAR_WORKER_TIMEOUT: "30"
    networks:
      - grammar-net
    restart: unless-stopped

  caddy:
    image: caddy:latest
    container_name: caddy_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - harcstack-org
      - cragcli-info
      - slangify-org
      - grammar-editor
    networks:
      - webnet
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  grammar-snapshots:

networks:
  webnet:
  grammar-net:
    internal: true

